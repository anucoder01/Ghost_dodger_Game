<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost Dodger Game</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #111, #333);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    #startScreen, #gameOverScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      animation: fadeIn 1s ease;
    }

    #startScreen.active, #gameOverScreen.active {
      display: flex;
    }

    button {
      padding: 12px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ff4081;
      color: white;
      font-weight: bold;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #gameCanvas {
      background: black;
      border: 2px solid white;
      display: none;
    }

    #pauseOverlay {
      position: absolute;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 2rem;
      display: none;
      align-items: center;
      justify-content: center;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 2;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .powerup {
      color: gold;
    }

    #toast {
      visibility: hidden;
      min-width: 200px;
      margin-left: -100px;
      background-color: #333;
      border: 1px solid #555;
      color: #fff;
      text-align: center;
      border-radius: 8px;
      padding: 12px;
      position: fixed;
      z-index: 3;
      left: 50%;
      bottom: 30px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.5s, visibility 0.5s;
    }

    #toast.show {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="startScreen" class="active">
    <h1>👻 Ghost Dodger</h1>
    <p id="totalCoinsDisplay" style="color: gold; font-weight: bold;">Total Coins: 0 🪙</p>
    <p>Select Skin:</p>
    <div>
      <button onclick="setPlayerEmoji('🧙‍♂️')">🧙‍♂️</button>
      <button onclick="setPlayerEmoji('🧛‍♂️')">🧛‍♂️</button>
      <button onclick="setPlayerEmoji('🧟‍♂️')">🧟‍♂️</button>
      <button onclick="setPlayerEmoji('👽')">👽</button>
      <button onclick="setPlayerEmoji('🤖')">🤖</button>
      <button onclick="setPlayerEmoji('🐱')">🐱</button>
      <button onclick="setPlayerEmoji('🦸‍♂️')">🦸‍♂️</button>
    </div>
    <p>Select Difficulty</p>
    <div>
      <button onclick="startGame('easy')">Easy 😌</button>
      <button onclick="startGame('medium')">Medium 😬</button>
      <button onclick="startGame('hard')">Hard 😈</button>
    </div>
  </div>

  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <div id="pauseOverlay">⏸️ Paused</div>

  <div id="gameOverScreen">
    <h2>Game Over! 💀</h2>
    <p id="scoreDisplay"></p>
    <p id="highScoreDisplay"></p>
    <p id="sessionCoinsDisplay" style="color: gold;"></p>
    <div style="display: flex; gap: 10px;">
      <button onclick="restartGame()">Restart</button>
      <button onclick="shareScore()">Share Score 🔗</button>
    </div>
  </div>

  <div id="toast">Score copied to clipboard!</div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const pauseOverlay = document.getElementById("pauseOverlay");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const highScoreDisplay = document.getElementById("highScoreDisplay");
    const totalCoinsDisplay = document.getElementById("totalCoinsDisplay");
    const sessionCoinsDisplay = document.getElementById("sessionCoinsDisplay");

    let player = { x: 180, y: 550, width: 40, height: 40, emoji: '🧙‍♂️', shield: false };
    let ghosts = [];
    let powerups = [];
    let coins = [];
    let keys = {};
    let gameLoop, spawnLoop, timerLoop, powerupLoop, coinLoop;
    let speed = 2;
    let difficulty = 'easy';
    let survivalTime = 0;
    let paused = false;
    let level = 1;
    let sessionCoins = 0;
    let totalCoins = parseInt(localStorage.getItem('ghostDodgerTotalCoins')) || 0;
    totalCoinsDisplay.textContent = `Total Coins: ${totalCoins} 🪙`;

    let levelTimeLeft = 120;
    let isTransitioning = false;
    let rainParticles = [];
    let stars = [];
    for(let i=0; i<50; i++) {
      stars.push({x: Math.random()*400, y: Math.random()*600, radius: Math.random()*1.5});
    }

    function drawEmoji(x, y, emoji) {
      ctx.font = "32px Arial";
      ctx.fillText(emoji, x, y);
    }

    function drawPlayer() {
      if (player.shield) {
        ctx.beginPath();
        ctx.arc(player.x + 16, player.y - 10, 25, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 200, 255, 0.4)";
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(0, 200, 255, 0.8)";
        ctx.stroke();
        ctx.closePath();
      }
      drawEmoji(player.x, player.y, player.emoji);
    }

    function drawGhosts() {
      ghosts.forEach(g => drawEmoji(g.x, g.y, g.emoji));
    }

    function drawPowerups() {
      powerups.forEach(p => drawEmoji(p.x, p.y, p.emoji));
    }

    function drawCoins() {
      coins.forEach(c => drawEmoji(c.x, c.y, '🪙'));
    }

    function drawBackground() {
      if (level === 1 || level > 3) {
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, "#87ceeb");
        grad.addColorStop(1, "#e0f6ff");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else if (level === 2) {
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, "#2c3e50");
        grad.addColorStop(1, "#34495e");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        if (Math.random() < 0.3) {
          rainParticles.push({x: Math.random()*canvas.width, y: -10, speedY: 10 + Math.random()*5, speedX: -1 + Math.random()*2});
        }
        rainParticles.forEach((p, i) => {
          p.x += p.speedX;
          p.y += p.speedY;
          ctx.fillRect(p.x, p.y, 2, 10);
          if (p.y > canvas.height) rainParticles.splice(i, 1);
        });
        
        if (Math.random() < 0.01) {
          ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
      } else if (level === 3) {
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, "#0b0b2a");
        grad.addColorStop(1, "#000000");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "white";
        stars.forEach(s => {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    }

    function drawHUD() {
      ctx.fillStyle = "black";
      ctx.font = "20px Arial";
      if(level === 2 || level === 3) ctx.fillStyle = "white";
      ctx.fillText(`Lvl: ${level}`, 10, 30);
      ctx.fillText(`${levelTimeLeft}s`, 10, 60);
      ctx.fillStyle = "gold";
      ctx.fillText(`Coins: ${sessionCoins} 🪙`, canvas.width - 130, 30);
      
      if (isTransitioning) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 40px Arial";
        ctx.fillText(`LEVEL ${level}`, canvas.width/2 - 80, canvas.height/2);
      }
    }

    function updateGhosts() {
      ghosts.forEach(g => {
        g.y += g.speed;
        if (g.type === 'zigzag') {
          g.x += Math.sin(g.y / 20) * 2;
        } else if (g.type === 'chaser') {
          if (g.x < player.x) g.x += 1.5;
          if (g.x > player.x) g.x -= 1.5;
        }
      });
      ghosts = ghosts.filter(g => g.y < canvas.height);
    }

    function updateCoins() {
      coins.forEach(c => c.y += 3);
      coins = coins.filter(c => c.y < canvas.height);
    }

    function updatePowerups() {
      powerups.forEach(p => p.y += 2);
      powerups = powerups.filter(p => p.y < canvas.height);
    }

    function spawnGhost() {
      if (isTransitioning) return;
      const x = Math.random() * (canvas.width - 30);
      let type = 'normal';
      let emoji = '👾';
      
      if (level >= 2 && Math.random() > 0.6) {
        type = 'zigzag';
        emoji = '👻';
      }
      if (level >= 3 && Math.random() > 0.7) {
        type = 'chaser';
        emoji = '💀';
      }
      
      ghosts.push({ x, y: -30, speed, type, emoji });
    }

    function spawnCoin() {
      if (isTransitioning) return;
      const x = Math.random() * (canvas.width - 30);
      coins.push({ x, y: -30 });
    }

    function spawnPowerup() {
      if (isTransitioning) return;
      const x = Math.random() * (canvas.width - 30);
      const type = Math.random() > 0.5 ? 'shield' : 'slow';
      const emoji = type === 'shield' ? '🛡️' : '🐢';
      powerups.push({ x, y: -30, type, emoji });
    }

    function checkCollision() {
      return ghosts.some(g =>
        g.y + 30 > player.y &&
        g.x < player.x + player.width &&
        g.x + 30 > player.x
      );
    }

    function checkPowerupCollision() {
      powerups.forEach((p, index) => {
        if (
          p.y + 30 > player.y &&
          p.x < player.x + player.width &&
          p.x + 30 > player.x
        ) {
          if (p.type === 'shield') {
            player.shield = true;
            setTimeout(() => player.shield = false, 5000);
          } else if (p.type === 'slow') {
            speed = Math.max(1, speed - 1);
            setTimeout(() => speed += 1, 5000);
          }
          powerups.splice(index, 1);
        }
      });
    }

    function checkCoinCollision() {
      coins.forEach((c, index) => {
        if (
          c.y + 30 > player.y &&
          c.x < player.x + player.width &&
          c.x + 30 > player.x
        ) {
          sessionCoins++;
          coins.splice(index, 1);
        }
      });
    }

    function handleKeys() {
      if (keys['ArrowLeft']) player.x -= 5;
      if (keys['ArrowRight']) player.x += 5;
      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
    }

    function triggerLevelTransition() {
      isTransitioning = true;
      level++;
      ghosts = [];
      coins = [];
      powerups = [];
      speed += 1;
      setTimeout(() => {
        levelTimeLeft = 120;
        isTransitioning = false;
      }, 2000);
    }

    function gameTick() {
      if (paused) return;
      drawBackground();
      if (isTransitioning) {
        drawHUD();
        return;
      }
      handleKeys();
      updateGhosts();
      updatePowerups();
      updateCoins();
      drawPlayer();
      drawGhosts();
      drawPowerups();
      drawCoins();
      drawHUD();
      checkPowerupCollision();
      checkCoinCollision();

      if (checkCollision()) {
        if (player.shield) {
          ghosts = ghosts.filter(g =>
            !(g.y + 30 > player.y && g.x < player.x + player.width && g.x + 30 > player.x)
          );
        } else {
          endGame();
        }
      }
    }

    function setPlayerEmoji(emoji) {
      player.emoji = emoji;
    }

    function startGame(selectedDifficulty) {
      difficulty = selectedDifficulty;
      if (difficulty === 'easy') speed = 2;
      if (difficulty === 'medium') speed = 3;
      if (difficulty === 'hard') speed = 4;

      survivalTime = 0;
      level = 1;
      levelTimeLeft = 120;
      isTransitioning = false;
      sessionCoins = 0;
      player.x = 180;
      player.shield = false;
      ghosts = [];
      powerups = [];
      coins = [];
      paused = false;

      startScreen.classList.remove('active');
      canvas.style.display = 'block';
      pauseOverlay.style.display = 'none';

      document.addEventListener('keydown', (e) => {
        keys[e.key] = true;
        if (e.key === 'Escape') togglePause();
      });
      document.addEventListener('keyup', (e) => keys[e.key] = false);

      gameLoop = setInterval(gameTick, 30);
      spawnLoop = setInterval(spawnGhost, 800);
      powerupLoop = setInterval(spawnPowerup, 10000);
      coinLoop = setInterval(spawnCoin, 3000);
      timerLoop = setInterval(() => {
        if (!paused && !isTransitioning) {
          survivalTime++;
          levelTimeLeft--;
          if (levelTimeLeft <= 0) {
            triggerLevelTransition();
          } else if (survivalTime % 10 === 0) {
            speed += 0.5;
          }
        }
      }, 1000);
    }

    function togglePause() {
      paused = !paused;
      pauseOverlay.style.display = paused ? 'flex' : 'none';
    }

    function endGame() {
      clearInterval(gameLoop);
      clearInterval(spawnLoop);
      clearInterval(timerLoop);
      clearInterval(powerupLoop);
      clearInterval(coinLoop);
      canvas.style.display = 'none';
      pauseOverlay.style.display = 'none';
      gameOverScreen.classList.add('active');

      scoreDisplay.textContent = `⏱ You survived for ${survivalTime} seconds. (Level ${level})`;
      sessionCoinsDisplay.textContent = `Coins Collected: ${sessionCoins} 🪙`;

      totalCoins += sessionCoins;
      localStorage.setItem('ghostDodgerTotalCoins', totalCoins);
      totalCoinsDisplay.textContent = `Total Coins: ${totalCoins} 🪙`;

      let best = localStorage.getItem('ghostDodgerHighScore') || 0;
      if (survivalTime > best) {
        best = survivalTime;
        localStorage.setItem('ghostDodgerHighScore', best);
      }
      highScoreDisplay.textContent = `🏆 High Score: ${best} seconds`;
    }

    function restartGame() {
      gameOverScreen.classList.remove('active');
      startScreen.classList.add('active');
    }

    function shareScore() {
      const diffEmoji = difficulty === 'hard' ? '😈' : difficulty === 'medium' ? '😬' : '😌';
      const text = `Ghost Dodger 👻 | Score: ${survivalTime}s | Difficulty: ${difficulty} ${diffEmoji} | Can you beat me?`;
      
      if (navigator.share) {
        navigator.share({
          title: 'Ghost Dodger Score',
          text: text
        }).catch(err => console.error('Share failed:', err));
      } else {
        navigator.clipboard.writeText(text).then(() => {
          const toast = document.getElementById("toast");
          toast.className = "show";
          setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        });
      }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.error('ServiceWorker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
